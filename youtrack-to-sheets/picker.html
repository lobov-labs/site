<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Select spreadsheet</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#111318;color:#e2e6f0;font-family:'Inter',system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;}
    .state{text-align:center;padding:40px;}
    .spinner{width:36px;height:36px;border:3px solid #2d3140;border-top-color:#6c8eff;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;}
    @keyframes spin{to{transform:rotate(360deg)}}
    p{font-size:13px;color:#8b92a8;}
    .error{color:#f87171;font-size:13px;}
    .back-btn{margin-top:16px;padding:8px 18px;background:#1c1f27;border:1px solid #2d3140;border-radius:7px;color:#6c8eff;font-size:12px;font-weight:600;cursor:pointer;display:none;}
    .back-btn:hover{background:#22262f;border-color:#6c8eff;}
  </style>
</head>
<body>
<div class="state" id="state">
  <div class="spinner" id="spinner"></div>
  <p id="msg">Loading…</p>
  <button class="back-btn" id="backBtn">← Try another file</button>
</div>
<script src="picker-config.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const extId = params.get('ext');
  const token = decodeURIComponent(window.location.hash.slice(1));

  if (!extId || !token) {
    showError('Missing extension parameters.');
  } else {
    loadPicker();
  }

  function loadPicker() {
    document.getElementById('msg').textContent = 'Loading Google Picker…';
    const script = document.createElement('script');
    script.src = 'https://apis.google.com/js/api.js';
    script.onload = () => gapi.load('picker', createPicker);
    script.onerror = () => showError('Failed to load Google API');
    document.head.appendChild(script);
  }

  let picker;

  function createPicker() {
    document.getElementById('msg').textContent = 'Opening picker…';

    const view = new google.picker.DocsView(google.picker.ViewId.SPREADSHEETS)
      .setIncludeFolders(false)
      .setSelectFolderEnabled(false);

    picker = new google.picker.PickerBuilder()
      .addView(view)
      .setOAuthToken(token)
      .setDeveloperKey(window.PICKER_API_KEY)
      .setCallback(pickerCallback)
      .build();

    picker.setVisible(true);

    document.getElementById('backBtn').addEventListener('click', () => {
      document.getElementById('backBtn').style.display = 'none';
      document.getElementById('spinner').style.display = '';
      document.getElementById('msg').className = '';
      document.getElementById('msg').textContent = 'Opening picker…';
      document.getElementById('state').style.display = 'none';
      picker.setVisible(true);
    });

    setTimeout(() => {
      document.getElementById('state').style.display = 'none';
    }, 600);
  }

  async function pickerCallback(data) {
    if (data.action === google.picker.Action.PICKED) {
      const doc = data.docs[0];
      document.getElementById('state').style.display = 'flex';
      document.getElementById('spinner').style.display = '';
      document.getElementById('backBtn').style.display = 'none';
      document.getElementById('msg').className = '';
      document.getElementById('msg').textContent = 'Checking access…';
      try {
        const resp = await fetch(
          `https://www.googleapis.com/drive/v3/files/${doc.id}?fields=capabilities.canEdit`,
          { headers: { Authorization: 'Bearer ' + token } }
        );
        if (resp.ok) {
          const json = await resp.json();
          if (json.capabilities?.canEdit === false) {
            showError('This spreadsheet is read-only. Please select one you can edit.');
            return;
          }
        }
      } catch {
        // access check failed — proceed and let Sheets API handle it
      }
      chrome.runtime.sendMessage(extId, {
        type: 'PICKER_SELECTED',
        fileId: doc.id,
        fileName: doc.name
      }, () => window.close());
    } else if (data.action === google.picker.Action.CANCEL) {
      chrome.runtime.sendMessage(extId, { type: 'PICKER_CANCEL' }, () => window.close());
    }
  }

  function showError(msg) {
    document.getElementById('spinner').style.display = 'none';
    const el = document.getElementById('msg');
    el.className = 'error';
    el.textContent = msg;
    document.getElementById('backBtn').style.display = 'inline-block';
  }
</script>
</body>
</html>
